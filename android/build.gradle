def mapboxDownloadsToken = System.getenv("RNMAPBOX_MAPS_DOWNLOAD_TOKEN") ?: System.getenv("MAPBOX_DOWNLOADS_TOKEN") ?: ""

if (!mapboxDownloadsToken) {
    logger.warn("Mapbox downloads token is not set. Define RNMAPBOX_MAPS_DOWNLOAD_TOKEN (preferred) or MAPBOX_DOWNLOADS_TOKEN.")
}

buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        maven {
            url = uri("https://api.mapbox.com/downloads/v2/releases/maven?access_token=${System.getenv('RNMAPBOX_MAPS_DOWNLOAD_TOKEN') ?: System.getenv('MAPBOX_DOWNLOADS_TOKEN') ?: ''}")
        }
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

allprojects {
    repositories {
        maven {
            url = uri("https://api.mapbox.com/downloads/v2/releases/maven?access_token=${System.getenv('RNMAPBOX_MAPS_DOWNLOAD_TOKEN') ?: System.getenv('MAPBOX_DOWNLOADS_TOKEN') ?: ''}")
        }
        google()
        mavenCentral()
    }
}

apply plugin: "com.facebook.react.rootproject"
apply plugin: "expo-root-project"
